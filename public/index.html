<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operation Promise Keeper — Offering System</title>
  <style>
    :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --ink:#e6e9ef; --mut:#8b93a3; --acc:#4ea1ff; --bad:#ff6b6b; --warn:#ffb454; --ok:#5bd99a; }
    * { box-sizing:border-box; } body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:18px 24px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:16px; }
    header h1 { font-size:16px; margin:0; font-weight:650; } header .sub { color:var(--mut); font-size:12px; }
    nav { display:flex; gap:4px; padding:12px 24px 0; }
    nav button { background:transparent; color:var(--mut); border:0; border-bottom:2px solid transparent; padding:8px 12px; cursor:pointer; font:inherit; }
    nav button.active { color:var(--ink); border-bottom-color:var(--acc); }
    main { padding:20px 24px; display:grid; grid-template-columns:1fr 360px; gap:16px; align-items:start; }
    main.single { grid-template-columns:1fr; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; }
    table { width:100%; border-collapse:collapse; font-size:13px; } th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--mut); font-weight:550; } tbody tr { cursor:pointer; } tbody tr:hover { background:#1d212b; } tbody tr.sel { background:#202636; }
    .pill { padding:1px 8px; border-radius:999px; font-size:11px; border:1px solid var(--line); }
    .crit{color:var(--bad);border-color:var(--bad)} .high{color:var(--warn);border-color:var(--warn)} .ok{color:var(--ok);border-color:var(--ok)}
    .empty { color:var(--mut); padding:28px; text-align:center; } code { color:var(--acc); } pre { white-space:pre-wrap; word-break:break-word; font-size:12px; color:var(--ink); background:#0f1218; border:1px solid var(--line); border-radius:8px; padding:10px; }
    .hint { color:var(--mut); font-size:12px; margin:0 0 16px; }
    .aside h3 { margin:0 0 10px; font-size:13px; } .aside .lbl { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-top:12px; }
    form.book { display:flex; flex-direction:column; gap:8px; margin-top:6px; } form.book input { background:#0f1218; border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:8px; font:inherit; }
    form.book button { background:var(--acc); color:#06101f; border:0; border-radius:7px; padding:9px; font:inherit; font-weight:600; cursor:pointer; }
    .span2 { grid-column:1 / -1; }
    .detail-block { margin-bottom:14px; font-size:13px; }
    .detail-block .head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .detail-block .subline { color:var(--mut); font-size:12px; margin:0 0 6px; }
    .ev-list { list-style:none; margin:0; padding:0; } .ev-item { padding:8px 0; border-bottom:1px solid var(--line); font-size:12px; line-height:1.45; }
    .ev-item:last-child { border-bottom:0; }
    .ev-excluded { opacity:0.75; }
    .breakdown { line-height:1.5; margin-top:4px; }
    .mini-table { width:100%; font-size:12px; border-collapse:collapse; margin-top:4px; }
    .mini-table th, .mini-table td { padding:4px 6px; border-bottom:1px solid var(--line); }
    .mini-table th { color:var(--mut); font-weight:550; }
    .reasons { margin:6px 0 0; padding-left:18px; color:var(--ink); font-size:13px; }
    .book-ok { color:var(--ok); } .book-fail { color:var(--bad); }
    .repl { margin-top:6px; display:inline-block; background:transparent; color:var(--acc); border:1px solid var(--acc); border-radius:6px; padding:3px 8px; font-size:11px; cursor:pointer; }
    .repl:hover { background:#1a2a3d; }
    .feed-note { color:var(--mut); font-size:11px; margin-top:4px; }
    .feed-panel { margin-top:16px; }
    .inv-toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:14px; }
    .inv-toolbar label { display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--mut); }
    .inv-toolbar select, .inv-toolbar input { background:#0f1218; border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:7px 8px; font:inherit; min-width:100px; }
    .inv-toolbar button { background:#1d2430; color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:4px 10px; font-size:12px; line-height:1.3; cursor:pointer; }
    .inv-toolbar button.primary { background:var(--acc); color:#06101f; border-color:var(--acc); font-weight:600; }
    .inv-pager { display:flex; align-items:center; justify-content:space-between; margin-top:12px; font-size:12px; color:var(--mut); }
    .inv-pager button { background:#1d2430; color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:6px 12px; font:inherit; cursor:pointer; }
    .inv-pager button:disabled { opacity:0.4; cursor:not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>MESHA · Promise Keeper</h1>
    <span class="sub" id="clock">loading clock…</span>
  </header>
  <nav>
    <button data-tab="inventory" class="active">Available goats</button>
    <button data-tab="bookings">Bookings</button>
    <button data-tab="discrepancies">Offering discrepancies</button>
  </nav>
  <main id="main">
    <div class="panel" id="view"><div class="empty">Select a tab.</div></div>
    <div class="panel aside" id="aside">
      <p class="hint">Click a goat for eligibility, price, and history. Book from the form — successful bookings remove the goat from inventory.</p>
      <div id="detail"><div class="empty">Click a goat to see its verdict, price, and evidence.</div></div>
      <div class="lbl">Try a booking</div>
      <form class="book" id="bookform" autocomplete="off">
        <input id="b_animal" placeholder="canonical goat id (e.g. G-CBE-0001)" />
        <input id="b_name" placeholder="customer name" />
        <input id="b_phone" placeholder="customer phone" />
        <button type="submit">Book this goat</button>
      </form>
      <div id="bookresult"></div>
    </div>
  </main>
  <script>
    const view = document.getElementById('view');
    const aside = document.getElementById('aside');
    const main = document.getElementById('main');
    const detail = document.getElementById('detail');

    const inventoryState = { breed: '', priceMin: '', priceMax: '', page: 1, limit: 15 };
    const discrepancyState = { severity: '', page: 1, limit: 15 };
    const discrepancyData = { rows: [], offers: null, feed: null };
    const bookingsState = { page: 1, limit: 15 };
    const bookingsData = { rows: [] };

    function paginateRows(rows, page, limit) {
      const total = rows.length;
      const totalPages = Math.max(1, Math.ceil(total / limit) || 1);
      const safePage = Math.max(1, Math.min(page, totalPages));
      const start = (safePage - 1) * limit;
      return {
        items: rows.slice(start, start + limit),
        total,
        page: safePage,
        limit,
        totalPages,
        rangeStart: total === 0 ? 0 : start + 1,
        rangeEnd: Math.min(safePage * limit, total),
      };
    }

    function pagerHtml(prefix, pageInfo) {
      const { page, totalPages, rangeStart, rangeEnd, total } = pageInfo;
      return `<div class="inv-pager">
          <span>Showing ${rangeStart}–${rangeEnd} of ${total} · page ${page} / ${totalPages}</span>
          <span>
            <button type="button" id="${prefix}_prev" ${page <= 1 ? 'disabled' : ''}>Previous</button>
            <button type="button" id="${prefix}_next" ${page >= totalPages ? 'disabled' : ''}>Next</button>
          </span>
        </div>`;
    }

    function bindPager(prefix, pageInfo, onPageChange) {
      document.getElementById(`${prefix}_prev`).onclick = () => {
        if (pageInfo.page > 1) onPageChange(pageInfo.page - 1);
      };
      document.getElementById(`${prefix}_next`).onclick = () => {
        if (pageInfo.page < pageInfo.totalPages) onPageChange(pageInfo.page + 1);
      };
    }

    async function clock() {
      try { const c = await (await fetch('/api/config')).json();
        document.getElementById('clock').textContent =
          `today ${c.simulation.now.slice(0,10)} · delivery ${c.simulation.deliveryDate} · min ${c.rules.minWeightKg}kg / ${c.rules.minAgeDays}d`;
      } catch { document.getElementById('clock').textContent = 'clock unavailable'; }
    }
    function sev(s){ const c = s==='critical'?'crit':(s==='high'||s==='medium')?'high':'ok'; return `<span class="pill ${c}">${s}</span>`; }

    function replCell(x) {
      const offer = x.replacementOffer;
      if (!offer) return sev(x.severity);
      return `${sev(x.severity)}<br>
        <button type="button" class="repl" data-issue="${esc(x.issueId)}"
          title="Assign ${esc(offer.substituteCanonicalId)} (${esc(offer.breed)}, ${esc(offer.trustedWeightKg)} kg)">
          Replacement available
        </button>
        <div class="repl-note"><code>${esc(offer.substituteCanonicalId)}</code> · ${esc(offer.breed)} · ${esc(offer.trustedWeightKg)} kg</div>`;
    }

    function bindReplacementButtons(root) {
      root.querySelectorAll('.repl').forEach(btn => {
        btn.onclick = (ev) => {
          ev.stopPropagation();
          applyReplacement(btn.dataset.issue, btn);
        };
      });
    }

    function mergeReplacementOffers(offers) {
      if (!offers || typeof offers !== 'object') return;
      view.querySelectorAll('tr[data-issue]').forEach(row => {
        const offer = offers[row.dataset.issue];
        if (!offer) return;
        const sevCell = row.querySelector('.sev-cell');
        if (!sevCell) return;
        sevCell.innerHTML = replCell({
          issueId: row.dataset.issue,
          severity: row.dataset.severity,
          replacementOffer: offer,
        });
      });
      bindReplacementButtons(view);
    }

    const SEVERITY_RANK = { critical: 0, high: 1, medium: 2, low: 3 };
    function sortDiscrepancies(rows) {
      return [...rows].sort((a, b) => {
        const sd = SEVERITY_RANK[a.severity] - SEVERITY_RANK[b.severity];
        if (sd !== 0) return sd;
        return a.issueId.localeCompare(b.issueId);
      });
    }

    function filterDiscrepancies(rows) {
      if (!discrepancyState.severity) {
        return rows;
      }
      return rows.filter((r) => r.severity === discrepancyState.severity);
    }

    function renderDiscrepanciesView() {
      const allRows = discrepancyData.rows;
      const filtered = filterDiscrepancies(allRows);
      const pageInfo = paginateRows(filtered, discrepancyState.page, discrepancyState.limit);
      discrepancyState.page = pageInfo.page;
      const rows = pageInfo.items;
      const severities = [...new Set(allRows.map((r) => r.severity).filter(Boolean))]
        .sort((a, b) => SEVERITY_RANK[a] - SEVERITY_RANK[b]);
      const severityOptions = ['<option value="">All severities</option>'].concat(
        severities.map((s) => `<option value="${esc(s)}"${discrepancyState.severity === s ? ' selected' : ''}>${esc(s)}</option>`),
      ).join('');

      if (allRows.length === 0) {
        view.innerHTML = '<div class="empty">No rows.</div>';
        return;
      }

      const tableRows = rows.map(x => `<tr data-issue="${esc(x.issueId)}" data-severity="${esc(x.severity)}"><td class="sev-cell">${replCell(x)}</td><td>${esc(x.title??'')}<br><span style="color:#8b93a3">${esc(x.entityType)} ${esc(x.entityId??'')}</span></td>
          <td>${esc(x.affectedCustomer??'—')}</td><td>${esc(x.explanation??'')}</td></tr>`).join('');

      view.innerHTML = `
        <form class="inv-toolbar" id="disc-filters">
          <label>Severity
            <select id="disc_severity">${severityOptions}</select>
          </label>
          <button type="submit" class="primary">Apply</button>
          <button type="button" id="disc_reset">Reset</button>
          <span style="font-size:12px;color:var(--mut);align-self:center">${filtered.length} of ${allRows.length} issues</span>
        </form>
        ${filtered.length === 0
          ? '<div class="empty">No issues match this severity.</div>'
          : `<table><thead><tr><th>Severity</th><th>What</th><th>Customer</th><th>Explanation</th></tr></thead><tbody>${tableRows}</tbody></table>
             ${pagerHtml('disc', pageInfo)}`}`;

      document.getElementById('disc-filters').onsubmit = (ev) => {
        ev.preventDefault();
        discrepancyState.severity = document.getElementById('disc_severity').value;
        discrepancyState.page = 1;
        renderDiscrepanciesView();
      };
      document.getElementById('disc_reset').onclick = () => {
        discrepancyState.severity = '';
        discrepancyState.page = 1;
        renderDiscrepanciesView();
      };
      if (filtered.length > 0) {
        bindPager('disc', pageInfo, (p) => {
          discrepancyState.page = p;
          renderDiscrepanciesView();
        });
      }

      if (rows.length > 0) {
        bindReplacementButtons(view);
        if (discrepancyData.offers) {
          mergeReplacementOffers(discrepancyData.offers);
        }
      }
      if (discrepancyData.feed) {
        try { renderFeedExposureSection(discrepancyData.feed); } catch { /* feed panel is optional */ }
      }
    }

    function renderFeedExposureSection(feed) {
      if (!feed?.exposures?.length) return;
      const panel = document.createElement('div');
      panel.className = 'panel feed-panel span2';
      const rows = feed.exposures.map(r => {
        const dates = (r.exposureEvents||[]).map(e => e.logDate).join(', ');
        const customer = (r.affectedBookings||[]).map(b => b.customerName).join('; ') || '—';
        const cleared = r.clearedForDelivery ? 'yes' : 'no';
        const evIds = (r.evidence||[]).slice(0,4).map(e => `<code>${esc(e.recordId)}</code>`).join(' ');
        return `<tr><td><code>${esc(r.canonicalId)}</code></td><td>${esc(customer)}</td><td>${esc(dates)}</td>
          <td><span class="pill ${cleared==='yes'?'ok':'crit'}">${esc(cleared)}</span></td><td>${evIds}</td></tr>`;
      }).join('');
      panel.innerHTML = `<h3 style="margin:0 0 10px;font-size:13px">Feed contamination exposure</h3>
        <p class="hint">Batch FEED-B-2207 in CBE-S04 (${esc((feed.contaminatedBatches||[]).map(b=>b.logDate).join(', '))}). Location from movements, not current shed.</p>
        <table><thead><tr><th>Goat</th><th>Booked customer</th><th>Exposed dates</th><th>Cleared for delivery</th><th>Evidence</th></tr></thead><tbody>${rows}</tbody></table>`;
      view.appendChild(panel);
    }

    async function loadDiscrepanciesTab() {
      const [discRes, offersRes, feedRes] = await Promise.all([
        fetch('/api/discrepancies'),
        fetch('/api/discrepancies/replacement-offers'),
        fetch('/api/feed-exposure'),
      ]);
      const data = await discRes.json();
      if (!discRes.ok) {
        view.innerHTML = `<div class="empty">Failed to load:<br><code>${esc(data.error||discRes.status)}</code></div>`;
        return;
      }
      let rows = Array.isArray(data) ? data : [];
      let feed = null;
      if (feedRes.ok) {
        try {
          feed = await feedRes.json();
          if (Array.isArray(feed.discrepancies) && feed.discrepancies.length) {
            rows = sortDiscrepancies([...rows, ...feed.discrepancies]);
          }
        } catch { /* feed trace is optional */ }
      }
      let offers = null;
      if (offersRes.ok) {
        try { offers = await offersRes.json(); } catch { /* offers are optional */ }
      }
      discrepancyData.rows = rows;
      discrepancyData.offers = offers;
      discrepancyData.feed = feed;
      renderDiscrepanciesView();
    }

    async function applyReplacement(issueId, btn) {
      btn.disabled = true;
      btn.textContent = 'Replacing…';
      try {
        const res = await fetch('/api/replacements', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ issueId }),
        });
        const data = await res.json();
        if (data.ok) {
          load('discrepancies');
        } else {
          btn.disabled = false;
          btn.textContent = 'Replacement available';
          alert(data.reason || 'Replacement failed');
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Replacement available';
        alert('Request failed: ' + e);
      }
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmtVal(v) {
      if (v === null || v === undefined) return '';
      return typeof v === 'object' ? JSON.stringify(v) : String(v);
    }
    function eligibilityStatusPill(status) {
      const cls = status === 'eligible' ? 'ok' : status === 'ineligible' ? 'crit' : 'high';
      return `<span class="pill ${cls}">${esc(status)}</span>`;
    }
    function formatEvidenceItem(e) {
      const head = `<code>${esc(e.source)}</code> · <code>${esc(e.recordId)}</code>`;

      if (e.source === 'pricing_inputs' && e.observedValue && typeof e.observedValue === 'object') {
        const o = e.observedValue;
        const breed = e.interpretedValue?.breed ?? '—';
        const valDate = e.interpretedValue?.valuationDate ?? o.effective_date;
        return `<li class="ev-item">
          ${head}<br>
          <strong>${esc(breed)}</strong> rate effective <strong>${esc(o.effective_date)}</strong><br>
          <span class="subline">₹${esc(o.mutton_rate_inr_per_kg)}/kg mutton · +${esc(o.breed_premium_pct)}% breed · +${esc(o.festival_surge_pct)}% festival surge</span><br>
          <span class="subline">Selected for valuation on ${esc(valDate)} (latest row on or before that date)</span>
        </li>`;
      }

      if (e.source === 'goatsense_telemetry') {
        if (e.interpretedValue === null) {
          return `<li class="ev-item ev-excluded">
            ${head}<br>
            <span class="subline">Excluded reading: ${esc(e.observedValue)} kg</span><br>
            <span class="subline">${esc(e.note || 'Not used in trusted weight')}</span>
          </li>`;
        }
        return `<li class="ev-item">
          ${head}<br>
          Scale read <strong>${esc(e.observedValue)} kg</strong>${e.interpretedValue !== undefined && e.interpretedValue !== e.observedValue ? ` → trusted <strong>${esc(e.interpretedValue)} kg</strong>` : ''}<br>
          <span class="subline">${esc(e.note || '')}</span>
        </li>`;
      }

      if (e.source === 'legacy_cpt_records') {
        return `<li class="ev-item">
          ${head}<br>
          Legacy weight <strong>${esc(e.observedValue)} lbs</strong> → <strong>${esc(e.interpretedValue)} kg</strong><br>
          <span class="subline">${esc(e.note || '')}</span>
        </li>`;
      }

      if (e.source === 'simulation_config') {
        return `<li class="ev-item">
          ${head}<br>
          <span class="subline">${esc(e.note || `Delivery date ${esc(e.observedValue)}`)}</span>
        </li>`;
      }

      if (e.source === 'health_ledger') {
        const obs = e.observedValue;
        let detail = '';
        if (obs && typeof obs === 'object') {
          detail = [obs.condition, obs.drug, obs.event_date].filter(Boolean).join(' · ');
        }
        return `<li class="ev-item">
          ${head}${e.field ? ` · ${esc(e.field)}` : ''}<br>
          ${detail ? `<span class="subline">${esc(detail)}</span><br>` : ''}
          ${e.note ? `<span class="subline">${esc(e.note)}</span>` : ''}
        </li>`;
      }

      if (e.source === 'goatos_animals') {
        return `<li class="ev-item">
          ${head}${e.field ? ` · ${esc(e.field)}` : ''}<br>
          ${e.observedValue !== undefined ? `<span class="subline">${esc(e.field || 'value')}: ${esc(fmtVal(e.observedValue))}</span>` : ''}
          ${e.note ? `<br><span class="subline">${esc(e.note)}</span>` : ''}
        </li>`;
      }

      return `<li class="ev-item">
        ${head}${e.field ? ` · ${esc(e.field)}` : ''}
        ${e.observedValue !== undefined ? `<br><span class="subline">${esc(fmtVal(e.observedValue))}</span>` : ''}
        ${e.note ? `<br><span class="subline">${esc(e.note)}</span>` : ''}
      </li>`;
    }

    function renderEvidence(list) {
      if (!list?.length) return '<p class="subline">No source evidence attached.</p>';
      return '<ul class="ev-list">' + list.map(formatEvidenceItem).join('') + '</ul>';
    }

    function priceBreakdown(price) {
      const ev = price.evidence || [];
      const rateEv = ev.find(e => e.source === 'pricing_inputs');
      if (!rateEv?.observedValue || typeof rateEv.observedValue !== 'object') return '';
      const r = rateEv.observedValue;
      const w = price.trustedWeightKg;
      const base = w * r.mutton_rate_inr_per_kg;
      const withBreed = base * (1 + r.breed_premium_pct / 100);
      return `<p class="subline breakdown">
        ${esc(w)} kg × ₹${esc(r.mutton_rate_inr_per_kg)}/kg = ₹${esc(Math.round(base).toLocaleString('en-IN'))}
        · +${esc(r.breed_premium_pct)}% breed → ₹${esc(Math.round(withBreed).toLocaleString('en-IN'))}
        · +${esc(r.festival_surge_pct)}% festival surge → <strong>₹${esc(price.amountInr?.toLocaleString?.('en-IN') ?? price.amountInr)}</strong>
      </p>`;
    }

    function renderEligibility(elig) {
      if (!elig) return '<p class="subline">No eligibility verdict.</p>';
      return `<div class="detail-block">
        <div class="head">${eligibilityStatusPill(elig.status)} <span class="subline">for delivery ${esc(elig.asOfDate)}</span></div>
        <ul class="reasons">${(elig.reasons||[]).map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
        <div class="lbl">Why we trust this</div>
        ${renderEvidence(elig.evidence)}
      </div>`;
    }
    function renderPrice(price) {
      if (!price) return '<p class="subline">Price unavailable (missing breed, weight, or rate).</p>';
      const weightItems = (price.evidence || []).filter(e => e.source === 'goatsense_telemetry' && e.interpretedValue != null);
      const excluded = (price.evidence || []).filter(e => e.source === 'goatsense_telemetry' && e.interpretedValue === null);
      const rateItems = (price.evidence || []).filter(e => e.source === 'pricing_inputs');
      const legacyItems = (price.evidence || []).filter(e => e.source === 'legacy_cpt_records');
      return `<div class="detail-block">
        <div class="head"><strong>₹${esc(price.amountInr?.toLocaleString?.('en-IN') ?? price.amountInr)}</strong></div>
        <p class="subline">Trusted weight <strong>${esc(price.trustedWeightKg)} kg</strong> · valued on ${esc(price.asOfDate)}</p>
        ${priceBreakdown(price)}
        <div class="lbl">Weight source</div>
        ${renderEvidence([...weightItems, ...legacyItems])}
        ${excluded.length ? `<div class="lbl">Excluded scale reads</div>${renderEvidence(excluded)}` : ''}
        <div class="lbl">Rate source</div>
        ${renderEvidence(rateItems)}
      </div>`;
    }
    function renderHistory(h) {
      if (!h) return '<p class="subline">History unavailable.</p>';
      const tel = (h.telemetry||[]).slice(0, 10);
      const telRows = tel.map(r=>`<tr><td>${esc(r.ts?.slice(0,10))}</td><td>${esc(r.weight)} kg</td><td><code>${esc(r.telemetry_id)}</code></td></tr>`).join('');
      const healthRows = (h.health||[]).map(e=>`<tr><td>${esc(e.event_date)}</td><td>${esc(e.event_type)}</td><td>${esc(e.condition||e.drug||'—')}</td><td><code>${esc(e.health_event_id)}</code></td></tr>`).join('');
      const breed = h.breeding || {};
      let breedHtml = '';
      if (breed.asKid) {
        const k = breed.asKid;
        breedHtml += `<p class="subline">As kid: dam <code>${esc(k.dam_id)}</code>, sire <code>${esc(k.sire_id)}</code> (${esc(k.kidding_date)}) · <code>${esc(k.breeding_record_id)}</code></p>`;
      }
      if ((breed.asDam||[]).length) {
        breedHtml += `<p class="subline">As dam: ${breed.asDam.map(b=>`<code>${esc(b.kid_animal_id)}</code>`).join(', ')}</p>`;
      }
      if ((breed.asSire||[]).length) {
        breedHtml += `<p class="subline">As sire: ${breed.asSire.map(b=>`<code>${esc(b.kid_animal_id)}</code>`).join(', ')}</p>`;
      }
      if (!breedHtml) breedHtml = '<p class="subline">No breeding records linked.</p>';
      return `<div class="detail-block">
        <p class="subline">${esc(h.telemetry?.length||0)} weigh-ins · ${esc(h.health?.length||0)} health events</p>
        <div class="lbl">Recent weight (telemetry)</div>
        ${tel.length ? `<table class="mini-table"><thead><tr><th>Date</th><th>Weight</th><th>Record</th></tr></thead><tbody>${telRows}</tbody></table>` : '<p class="subline">No telemetry for this goat\'s tags.</p>'}
        <div class="lbl">Health ledger</div>
        ${healthRows ? `<table class="mini-table"><thead><tr><th>Date</th><th>Type</th><th>Detail</th><th>Record</th></tr></thead><tbody>${healthRows}</tbody></table>` : '<p class="subline">No health events.</p>'}
        <div class="lbl">Lineage</div>
        ${breedHtml}
      </div>`;
    }

    async function showDetail(id, rowEl) {
      document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('sel'));
      if (rowEl) rowEl.classList.add('sel');
      document.getElementById('b_animal').value = id;
      detail.innerHTML = `<div class="empty">loading ${id}…</div>`;
      try {
        const [detailRes, histRes] = await Promise.all([
          fetch('/api/animals/' + encodeURIComponent(id)),
          fetch('/api/animals/' + encodeURIComponent(id) + '/history'),
        ]);
        const data = await detailRes.json();
        const history = histRes.ok ? await histRes.json() : null;
        if (!detailRes.ok) { detail.innerHTML = `<h3>${esc(id)}</h3><div class="empty"><code>${esc(data.error||detailRes.status)}</code></div>`; return; }
        detail.innerHTML = `<h3><code>${esc(id)}</code></h3>
          <div class="lbl">Festival eligibility</div>
          ${renderEligibility(data.eligibility)}
          <div class="lbl">Current price</div>
          ${renderPrice(data.price)}
          <div class="lbl">History &amp; lineage</div>
          ${renderHistory(history)}`;
      } catch(e) { detail.innerHTML = `<h3>${esc(id)}</h3><div class="empty">request failed: ${esc(e)}</div>`; }
    }

    function inventoryQueryString() {
      const p = new URLSearchParams();
      p.set('page', String(inventoryState.page));
      p.set('limit', String(inventoryState.limit));
      if (inventoryState.breed) p.set('breed', inventoryState.breed);
      if (inventoryState.priceMin !== '') p.set('priceMin', inventoryState.priceMin);
      if (inventoryState.priceMax !== '') p.set('priceMax', inventoryState.priceMax);
      return p.toString();
    }

    function renderInventoryTable(data) {
      const items = data.items || [];
      const total = data.total ?? 0;
      const page = data.page ?? 1;
      const limit = data.limit ?? 15;
      const breeds = data.breeds || [];
      const totalPages = Math.max(1, Math.ceil(total / limit) || 1);
      const start = total === 0 ? 0 : (page - 1) * limit + 1;
      const end = Math.min(page * limit, total);

      const breedOptions = ['<option value="">All breeds</option>'].concat(
        breeds.map(b => `<option value="${esc(b)}"${inventoryState.breed === b ? ' selected' : ''}>${esc(b)}</option>`),
      ).join('');

      const rows = items.map(a => `<tr data-id="${a.canonicalId??''}"><td><code>${a.canonicalId??''}</code></td><td>${esc(a.breed??'')}</td>
            <td>${esc(a.eligibility?.status??'')} ${a.eligibility?.reasons?.length?('· '+esc(a.eligibility.reasons.join('; '))):''}</td>
            <td>${a.price?.trustedWeightKg ?? '—'}</td>
            <td>${a.price?.amountInr??'—'}</td><!-- <td>${esc(a.identityConfidence??'')}</td> --></tr>`).join('');

      view.innerHTML = `
        <form class="inv-toolbar" id="inv-filters">
          <label>Breed
            <select id="inv_breed">${breedOptions}</select>
          </label>
          <label>Min price (₹)
            <input id="inv_price_min" type="number" min="0" step="100" placeholder="any" value="${esc(inventoryState.priceMin)}" />
          </label>
          <label>Max price (₹)
            <input id="inv_price_max" type="number" min="0" step="100" placeholder="any" value="${esc(inventoryState.priceMax)}" />
          </label>
          <button type="submit" class="primary">Apply</button>
          <button type="button" id="inv_reset">Reset</button>
        </form>
        ${items.length === 0
          ? '<div class="empty">No goats match these filters.</div>'
          : `<table><thead><tr><th>Goat</th><th>Breed</th><th>Eligibility</th><th>Weight (kg)</th><th>Price (₹)</th><!-- <th>Identity</th> --></tr></thead><tbody>${rows}</tbody></table>`}
        <div class="inv-pager">
          <span>Showing ${start}–${end} of ${total} · page ${page} / ${totalPages}</span>
          <span>
            <button type="button" id="inv_prev" ${page <= 1 ? 'disabled' : ''}>Previous</button>
            <button type="button" id="inv_next" ${page >= totalPages ? 'disabled' : ''}>Next</button>
          </span>
        </div>`;

      document.getElementById('inv-filters').onsubmit = (ev) => {
        ev.preventDefault();
        inventoryState.breed = document.getElementById('inv_breed').value;
        inventoryState.priceMin = document.getElementById('inv_price_min').value;
        inventoryState.priceMax = document.getElementById('inv_price_max').value;
        inventoryState.page = 1;
        load('inventory');
      };
      document.getElementById('inv_reset').onclick = () => {
        inventoryState.breed = '';
        inventoryState.priceMin = '';
        inventoryState.priceMax = '';
        inventoryState.page = 1;
        load('inventory');
      };
      document.getElementById('inv_prev').onclick = () => {
        if (inventoryState.page > 1) { inventoryState.page -= 1; load('inventory'); }
      };
      document.getElementById('inv_next').onclick = () => {
        if (page < totalPages) { inventoryState.page += 1; load('inventory'); }
      };
      view.querySelectorAll('tbody tr').forEach(tr => tr.onclick = () => showDetail(tr.dataset.id, tr));
    }

    function bookingStatusPill(status) {
      const s = (status || '').toLowerCase();
      const cls = s === 'confirmed' ? 'ok' : (s === 'cancelled' || s === 'void') ? 'crit' : 'high';
      return `<span class="pill ${cls}">${esc(status || '—')}</span>`;
    }

    function renderBookingsView() {
      const allRows = bookingsData.rows;
      const pageInfo = paginateRows(allRows, bookingsState.page, bookingsState.limit);
      bookingsState.page = pageInfo.page;
      const rows = pageInfo.items;

      if (allRows.length === 0) {
        view.innerHTML = '<div class="empty">No bookings.</div>';
        return;
      }

      const tableRows = rows.map((b) => {
        const goat = b.assignedCanonicalId
          ? `<code>${esc(b.assignedCanonicalId)}</code>${b.hasSubstitute ? ' <span class="pill high">substitute</span>' : ''}`
          : `<span style="color:var(--mut)">unresolved</span>`;
        const gapCell = b.weightGapKg != null
          ? `<span class="pill high">${esc(b.weightGapKg)} kg short</span>`
          : (b.trustedWeightKg != null ? `${esc(b.trustedWeightKg)} kg` : '—');
        return `<tr>
            <td><code>${esc(b.bookingId)}</code><br><span style="color:var(--mut);font-size:11px">${esc(b.source)}</span></td>
            <td>${esc(b.customerName)}<br><span style="color:var(--mut);font-size:11px">${esc(b.customerPhone)}</span></td>
            <td><code>${esc(b.animalRef)}</code></td>
            <td>${goat}</td>
            <td>${esc(b.bookedOn)}</td>
            <td>${b.promisedWeightKg ?? '—'}</td>
            <td>${gapCell}</td>
            <td>${b.priceQuotedInr ?? '—'}</td>
            <td>${bookingStatusPill(b.status)}</td>
            <td>${b.notes ? esc(b.notes) : '—'}</td>
          </tr>`;
      }).join('');

      view.innerHTML = `
        <p class="hint" style="margin-top:0">${allRows.length} festival bookings · sheet + demo session</p>
        <table><thead><tr>
          <th>Booking</th><th>Customer</th><th>Animal ref</th><th>Assigned goat</th>
          <th>Booked on</th><th>Promised kg</th><th>Trusted / gap</th><th>Price (₹)</th><th>Status</th><th>Notes</th>
        </tr></thead><tbody>${tableRows}</tbody></table>
        ${pagerHtml('book', pageInfo)}`;

      bindPager('book', pageInfo, (p) => {
        bookingsState.page = p;
        renderBookingsView();
      });
    }

    async function loadBookingsTab() {
      try {
        const res = await fetch('/api/bookings');
        const data = await res.json();
        if (!res.ok) {
          view.innerHTML = `<div class="empty">Failed to load:<br><code>${esc(data.error||res.status)}</code></div>`;
          return;
        }
        bookingsData.rows = Array.isArray(data) ? data : [];
        renderBookingsView();
      } catch (e) {
        view.innerHTML = `<div class="empty">request failed: ${e}</div>`;
      }
    }

    async function loadInventoryTab() {
      const url = '/api/inventory?' + inventoryQueryString();
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) {
          view.innerHTML = `<div class="empty">Failed to load:<br><code>${esc(data.error||res.status)}</code></div>`;
          return;
        }
        renderInventoryTable(data);
        inventoryState.page = data.page ?? inventoryState.page;
      } catch (e) {
        view.innerHTML = `<div class="empty">request failed: ${e}</div>`;
      }
    }

    async function load(tab) {
      const showAside = tab === 'inventory';
      aside.style.display = showAside ? '' : 'none';
      main.classList.toggle('single', !showAside);
      view.innerHTML = '<div class="empty">loading…</div>';
      if (tab === 'discrepancies') {
        try { await loadDiscrepanciesTab(); } catch(e) { view.innerHTML = `<div class="empty">request failed: ${e}</div>`; }
        return;
      }
      if (tab === 'inventory') {
        await loadInventoryTab();
        return;
      }
      if (tab === 'bookings') {
        try { await loadBookingsTab(); } catch(e) { view.innerHTML = `<div class="empty">request failed: ${e}</div>`; }
        return;
      }
    }

    document.getElementById('bookform').onsubmit = async (ev) => {
      ev.preventDefault();
      const body = { canonicalAnimalId: document.getElementById('b_animal').value,
                     customer: { name: document.getElementById('b_name').value, phone: document.getElementById('b_phone').value } };
      const out = document.getElementById('bookresult');
      out.innerHTML = '<div class="empty">booking…</div>';
      try {
        const res = await fetch('/api/book', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        out.innerHTML = data.ok
          ? `<p class="book-ok">Booked — ${esc(data.bookingId)}</p><p class="subline">Goat removed from available inventory.</p>`
          : `<p class="book-fail">Not booked</p><p class="subline">${esc(data.reason||'unknown error')}</p>`;
        if (data.ok) load('inventory');
      } catch(e) { out.innerHTML = `<div class="empty">request failed: ${e}</div>`; }
    };

    document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); load(b.dataset.tab);
    });
    clock(); load('inventory');
  </script>
</body>
</html>
